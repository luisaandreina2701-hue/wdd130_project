<!DOCTYPE html>
<html>
<head>
    <title>Home Page Wireframe</title>
</head>

<body>

    <!-- THis is the header for the homepage-->

        <h2>Logo</h2>
        <a href="#">Home</a> |
        <a href="#">Regions</a> |
        <a href="#">Experiences</a> |
        <a href="#">Plan Your Trip</a>
    </div>

    <hr>

    <!-- This part is the Hero Section that has the big picture-->
    <div>
        <p>Eye-catching Image</p>
    </div>

    <hr>

    <!-- INtro section with Introductory text and button -->
    <div>
        <h2>Four Worlds, One Country</h2>
        <p>Introductory text here</p>
        <button>CTA Button</button>
    </div>

    <hr>

    <!-- Multiple images spread horizontally -->
    <div>
        <p>Image & Title (Costa)</p>
        <p>Image & Title (Andes)</p>
        <p>Image & Title (Amazon)</p>
        <p>Image & Title (Galápagos)</p>
    </div>

    <hr>

    <!-- Experiences Preview -->
    <div>
        <h3>Experiences Preview</h3>
        <p>Short excerpt</p>
        <button>Read More</button>
    </div>

    <hr>

    <!-- The Footer -->
    <div>
        <p>Contact Info</p>
        <p>Social Media Links</p>
    </div>

</body>
</html>
